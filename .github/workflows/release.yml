name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Bundle project
        run: |
          mkdir -p dist/hong-ai-box
          cp -a install.sh scripts README.md docs LICENSE dist/hong-ai-box/
          tar czf hong-ai-box.tar.gz -C dist hong-ai-box
          sha256sum hong-ai-box.tar.gz > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "hongaibox ${{ github.ref_name }}"
          body: |
            ## 洪哥的 AI 工具箱 ${{ github.ref_name }}

            ### 方式一：一键安装（推荐）

            ```bash
            curl -fsSL https://raw.githubusercontent.com/YoungHong1992/hong-ai-box/${{ github.ref_name }}/install.sh | sudo env HONGAIBOX_REF=${{ github.ref_name }} bash
            ```

            > 该入口会自动下载同一 tag 的完整安装包后再启动交互式安装。

            ### 方式二：下载完整包

            ```bash
            curl -fsSLO https://github.com/YoungHong1992/hong-ai-box/releases/latest/download/hong-ai-box.tar.gz
            tar xzf hong-ai-box.tar.gz
            cd hong-ai-box
            sudo ./install.sh
            ```

            ### 方式三：克隆仓库

            ```bash
            git clone https://github.com/YoungHong1992/hong-ai-box.git
            cd hong-ai-box
            sudo ./install.sh
            ```

            ### 可用组件

            | 组件 | 描述 | 资源需求 |
            |------|------|----------|
            | Nginx (HTTP/3) | 高性能 Web 服务器 + 反向代理 | 512MB 内存 |
            | Docker | Docker Engine + Compose 插件 | 无额外需求 |
            | CliproxyAPI | 轻量 AI API 转发代理 (~50MB) | 256MB 内存 |
            | New-API | AI 模型网关与资产管理系统 | ≥ 1GB 内存 |
            | Pi | 终端 AI 编程助手 | 500MB 磁盘 |
            | Science | VLESS + XTLS-Vision + Reality | 极低 |

          files: |
            hong-ai-box.tar.gz
            checksums.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
