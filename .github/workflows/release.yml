name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Bundle scripts
        run: |
          tar czf hong-ai-box-scripts.tar.gz scripts/
          sha256sum hong-ai-box-scripts.tar.gz > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "hongaibox ${{ github.ref_name }}"
          body: |
            ## 洪哥的 AI 工具箱 ${{ github.ref_name }}

            ### 方式一：一键安装（推荐）

            ```bash
            curl -fsSL https://raw.githubusercontent.com/YoungHong1992/hong-ai-box/main/install.sh | sudo bash
            ```

            ### 方式二：下载完整包

            ```bash
            # 下载并解压
            curl -fsSLO https://github.com/YoungHong1992/hong-ai-box/releases/latest/download/hong-ai-box-scripts.tar.gz
            tar xzf hong-ai-box-scripts.tar.gz

            # 复制 install.sh 到项目根目录（也可从仓库直接下载）
            curl -fsSLO https://raw.githubusercontent.com/YoungHong1992/hong-ai-box/main/install.sh
            chmod +x install.sh

            # 运行
            sudo ./install.sh
            ```

            ### 方式三：克隆仓库

            ```bash
            git clone https://github.com/YoungHong1992/hong-ai-box.git
            cd hong-ai-box
            chmod +x install.sh
            sudo ./install.sh
            ```

            ### 可用组件

            | 组件 | 描述 | 资源需求 |
            |------|------|----------|
            | Nginx (HTTP/3) | 高性能 Web 服务器 + 反向代理 | 512MB 内存 |
            | Docker | Docker Engine + Compose 插件 | 无额外需求 |
            | CliproxyAPI | 轻量 AI API 转发代理 (~50MB) | 256MB 内存 |
            | New-API | AI 模型网关与资产管理系统 | ≥ 1GB 内存 |
            | Pi | 终端 AI 编程助手 | 500MB 磁盘 |
            | Science | VLESS + XTLS-Vision + Reality | 极低 |

          files: |
            hong-ai-box-scripts.tar.gz
            checksums.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
